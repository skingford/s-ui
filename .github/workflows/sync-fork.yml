name: Sync Fork with Upstream

# 自动把上游 alireza0/s-ui 的变更同步到本 fork。
# 采用 merge 方式：拉取上游全部更新的同时，保留本 fork 上的本工作流文件，
# 因此即使分叉也不会失败、也不会把同步工作流自身删除。

on:
  schedule:
    - cron: '0 3 * * *'      # 每天 03:00 UTC（北京时间 11:00）同步一次
  workflow_dispatch:          # 支持在 Actions 页面手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge upstream changes (keep fork's own workflows)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/alireza0/s-ui.git
          git fetch upstream main
          # 已是最新则跳过，避免产生空的 merge 提交
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "已是最新，无需同步。"
            exit 0
          fi
          # 合并但先不提交，便于剔除上游对工作流文件的改动
          git merge --no-commit --no-ff upstream/main || true
          # 强制保留本 fork 自己的 .github/workflows
          # （GITHUB_TOKEN 无法推送对工作流文件的改动，否则会被拒绝）
          rm -rf .github/workflows
          git checkout HEAD -- .github/workflows
          git add -A .github/workflows
          # 若上游仅改动了工作流文件，剔除后可能无内容可提交
          if git diff --cached --quiet && git diff --quiet; then
            git merge --abort 2>/dev/null || true
            echo "上游仅改动工作流文件，已跳过。"
            exit 0
          fi
          git commit --no-edit -m "chore: sync upstream alireza0/s-ui (keep fork workflows)"
          git push origin main
